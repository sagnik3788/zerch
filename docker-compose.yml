version: '3.8'

services:
  # Rust API Service
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: zerch-api
    ports:
      - "8080:8080"
    environment:
      - ZERCH_API_HOST=0.0.0.0
      - ZERCH_API_PORT=8080
      - RUST_LOG=info
    volumes:
      - ./models_cache:/root/.cache/huggingface
      - ./logs:/app/logs
    networks:
      - zerch-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # React UI Service
  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
    container_name: zerch-ui
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://api:8080
    depends_on:
      - api
    networks:
      - zerch-network
    restart: unless-stopped

  # Nginx Reverse Proxy (Optional but recommended for production)
  nginx:
    image: nginx:latest
    container_name: zerch-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
      - ui
    networks:
      - zerch-network
    restart: unless-stopped

networks:
  zerch-network:
    driver: bridge

volumes:
  models_cache:
  logs:
