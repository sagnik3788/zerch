services:
  # Rust API Service
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: zerch-api
    ports:
      - "8080:8080"
    environment:
      - ZERCH_API_HOST=0.0.0.0
      - ZERCH_API_PORT=8080
      - RUST_LOG=info
      - GROQ_API_KEY=${GROQ_API_KEY}
      - QDRANT_URL=http://qdrant:6334
    volumes:
      - ./models_cache:/root/.cache/huggingface
      - ./logs:/app/logs
    networks:
      - zerch-network
    restart: unless-stopped
    depends_on:
      - qdrant
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Qdrant Vector Database
  qdrant:
    image: qdrant/qdrant:latest
    container_name: zerch-qdrant
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_storage:/qdrant/storage
    networks:
      - zerch-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # React UI Service
  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
    container_name: zerch-ui
    ports:
      - "5173:5173"
    depends_on:
      - api
    networks:
      - zerch-network
    restart: unless-stopped

networks:
  zerch-network:
    driver: bridge

volumes:
  models_cache:
  logs:
  qdrant_storage:
